# yaml-language-server: $schema=../../handlers.schema.json

routes:
  - operationId: api_data_virtual_players_delete
    method: DELETE
    path: /players/{playerId}
    workflow:
      steps:
        - action: opensearch.delete
          input:
            index: "{{resources.opensearch.indices.players}}"
            id: "{{params.playerId}}"
          saveAs: playerDeleteResult
        - action: util.boolToInt
          input:
            value: "{{vars.playerDeleteResult.deleted}}"
          saveAs: playersDeleted
        - action: opensearch.deleteByQuery
          input:
            index: "{{resources.opensearch.indices.playerNetwinDaily}}"
            query:
              term:
                playerId: "{{params.playerId}}"
          saveAs: netwinDeleteResult
        - action: opensearch.deleteByQuery
          input:
            index: "{{resources.opensearch.indices.playerBets}}"
            query:
              term:
                playerId: "{{params.playerId}}"
          saveAs: betsDeleteResult
        - action: util.math
          input:
            op: add
            a: "{{vars.playersDeleted}}"
            b: "{{vars.netwinDeleteResult.deleted}}"
          saveAs: deletedWithoutBets
        - action: util.math
          input:
            op: add
            a: "{{vars.deletedWithoutBets}}"
            b: "{{vars.betsDeleteResult.deleted}}"
          saveAs: deletedTotal
      response:
        status: 200
        bodyTemplate:
          ok: true
          playerId: "{{params.playerId}}"
          deleted:
            players: "{{vars.playersDeleted}}"
            playerNetwinDaily: "{{vars.netwinDeleteResult.deleted}}"
            playerBets: "{{vars.betsDeleteResult.deleted}}"
            total: "{{vars.deletedTotal}}"
