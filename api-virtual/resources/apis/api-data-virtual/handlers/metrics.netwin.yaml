# yaml-language-server: $schema=../../handlers.schema.json

routes:
  - operationId: api_data_virtual_metrics_netwin
    method: GET
    path: /metrics/netwin
    workflow:
      steps:
        - action: util.coalesce
          input:
            values:
              - "{{query.groupBy}}"
              - day
          saveAs: groupBy
        - action: util.buildFilters
          input:
            items:
              - type: term
                field: affiliateId
                value: "{{query.affiliateId}}"
              - type: range
                field: date
                gte: "{{query.dateIn}}"
                lte: "{{query.dateOut}}"
          saveAs: dailyFilters
        - action: util.toBoolQuery
          input:
            filters: "{{vars.dailyFilters}}"
          saveAs: dailyQuery
        - action: util.select
          input:
            key: "{{vars.groupBy}}"
            default:
              date_histogram:
                field: date
                calendar_interval: day
                min_doc_count: 1
              aggs:
                netwin:
                  sum:
                    field: netwin
                players:
                  cardinality:
                    field: playerId
                operations:
                  sum:
                    field: operationCount
            options:
              day:
                date_histogram:
                  field: date
                  calendar_interval: day
                  min_doc_count: 1
                aggs:
                  netwin:
                    sum:
                      field: netwin
                  players:
                    cardinality:
                      field: playerId
                  operations:
                    sum:
                      field: operationCount
              affiliate:
                terms:
                  field: affiliateId
                  size: 500
                aggs:
                  netwin:
                    sum:
                      field: netwin
                  players:
                    cardinality:
                      field: playerId
                  operations:
                    sum:
                      field: operationCount
              player:
                terms:
                  field: playerId
                  size: 500
                aggs:
                  netwin:
                    sum:
                      field: netwin
                  players:
                    cardinality:
                      field: playerId
                  operations:
                    sum:
                      field: operationCount
          saveAs: rowsAggregation
        - action: opensearch.search
          input:
            index: "{{resources.opensearch.indices.playerNetwinDaily}}"
            body:
              size: 0
              query: "{{vars.dailyQuery}}"
              aggs:
                rows:
                  "{{vars.rowsAggregation}}"
          saveAs: netwinAgg
        - set: rows
          value: []
        - forEach: "{{vars.netwinAgg.aggregations.rows.buckets}}"
          as: bucket
          steps:
            - action: util.coalesce
              input:
                values:
                  - "{{bucket.key_as_string}}"
                  - "{{bucket.key}}"
              saveAs: bucketKey
            - append: rows
              valueTemplate:
                key: "{{vars.bucketKey}}"
                netwin: "{{bucket.netwin.value}}"
                players: "{{bucket.players.value}}"
                operations: "{{bucket.operations.value}}"
      response:
        status: 200
        bodyTemplate:
          groupBy: "{{vars.groupBy}}"
          dateRange:
            dateIn: "{{query.dateIn}}"
            dateOut: "{{query.dateOut}}"
          filters:
            affiliateId: "{{query.affiliateId}}"
          rows: "{{vars.rows}}"
